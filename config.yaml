paths:
  base_dir: "C:/Users/Ítalo/OneDrive/stock-screener-automation"
  data_dir: "data"
  input_dir: "data/input"
  output_dir: "data/output"
  old_dir: "data/old"
  logs_dir: "logs"
  local_input_file: "data/input/Ranking_Acoes_FII.xlsx"

scraper:
  url: "https://www.fundsexplorer.com.br/ranking"
  wait_timeout: 20
  sleep_after_load: 4
  cookie_button_id: "didomi-notice-agree-button"

filters:
  pvp_max: 1.20
  dy_min: 0.05
  liquidez_min: 300000
  patrimonio_min: 200000000
  volatilidade_max: 3000.0
  top_n: 20

columns:
  percent:
    - "Dividend Yield"
    - "DY (3M) Acumulado"
    - "DY (6M) Acumulado"
    - "DY (12M) Acumulado"
    - "DY (3M) média"
    - "DY (6M) média"
    - "DY (12M) média"
    - "DY Ano"
    - "DY Patrimonial"
    - "Volatilidade"
  money:
    - "Preço Atual (R$)"
    - "Liquidez Diária (R$)"
    - "Patrimônio Líquido"
    - "VPA"
  integer:
    - "Quant. Ativos"
    - "Num. Cotistas"